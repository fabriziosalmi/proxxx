# Release workflow — fires on `v*` tag push, builds three target
# matrices, and attaches stripped binaries to the GitHub release.
#
# Why three targets:
#   - aarch64-apple-darwin       : macOS Apple Silicon (default for
#                                  M-series Macs; Intel macs run via
#                                  Rosetta 2 acceptably).
#   - x86_64-unknown-linux-musl  : Static Linux x86_64. Runs on every
#                                  distro from RHEL 6 to Alpine 3.x
#                                  without GLIBC drama.
#   - aarch64-unknown-linux-musl : Static Linux ARM64. Pi 4/5,
#                                  Ampere, Graviton, Oracle Free Tier.
#
# We don't ship a Windows binary — proxxx claims macOS + Linux only
# (per README's "Honest non-goals"). PowerShell users can use WSL2.
#
# This workflow does NOT replace `ci.yml`. ci.yml runs on every push
# and PR (build/test/clippy/fmt + audit + musl); release.yml runs on
# tag push only and assumes the tagged commit already passed ci.

name: Release

on:
  push:
    tags:
      - 'v*'

# Permissions used by this workflow:
#   - contents: write   — create release + upload assets (default
#                         GITHUB_TOKEN is read-only; override here only).
#   - id-token: write   — required for sigstore keyless cosign signing
#                         via OIDC. The action exchanges this token for
#                         a short-lived signing certificate; the cert
#                         pins the issuer + workflow path so a leaked
#                         cert from another repo can't validate against
#                         our bundles.
# Minimal top-level permissions — satisfy OpenSSF Scorecard TokenPermissions.
# contents:write and id-token:write are scoped to the jobs that need them.
permissions:
  contents: read

jobs:
  # ──────────────────────────────────────────────────────────
  # Build matrix — one job per target triple, parallel.
  # ──────────────────────────────────────────────────────────
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      # Required for cosign keyless signing — the action exchanges
      # this token for a short-lived Fulcio signing certificate
      # scoped to this exact workflow path. Without it the cosign
      # step fails at OIDC token retrieval ("expired_token").
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            archive_ext: tar.gz
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            archive_ext: tar.gz
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            archive_ext: tar.gz
            # ARM64 Linux statically-linked binary. Built via
            # `cross-rs/cross` which runs cargo inside a target-specific
            # Docker image with the proper musl-aware aarch64 toolchain.
            # This is the canonical solution for the C-dep cross-link
            # issue (rusqlite, sha2, russh) the bare
            # `gcc-aarch64-linux-gnu` approach hit. Runs on Pi 4/5,
            # Ampere, Graviton, Oracle Free Tier — anywhere with arm64
            # + Linux kernel ≥ 3.2.
            use_cross: true

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install Rust toolchain (with target)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable (HEAD as of 2026-03-27)
        with:
          targets: ${{ matrix.target }}

      - name: Install musl + cross tooling (Linux targets)
        if: contains(matrix.target, 'linux-musl')
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Install cross (aarch64 musl)
        if: matrix.use_cross == true
        # `cross` runs cargo inside a target-specific Docker container
        # with a working musl-aarch64 C toolchain — sidesteps the
        # rusqlite/sha2/russh native-dep cross-link breakage that the
        # bare `gcc-aarch64-linux-gnu` approach hit at v0.1.0.
        # `--locked` pins the dep graph at install time (the cross
        # binary's own Cargo.lock); `--version` pins the cross release.
        run: cargo install cross --locked --version 0.2.5

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1
        with:
          shared-key: release-${{ matrix.target }}

      - name: Build release binary
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Verify Linux binary is statically linked
        if: contains(matrix.target, 'linux-musl')
        run: |
          set -e
          BIN=target/${{ matrix.target }}/release/proxxx
          file "$BIN"
          # `ldd` on a static binary prints "not a dynamic executable"
          # OR "statically linked" — both are correct. We fail only if
          # it lists actual shared deps (`=>`).
          if ldd "$BIN" 2>&1 | grep -q "=>"; then
            echo "ERROR: $BIN still has dynamic deps" >&2
            ldd "$BIN"
            exit 1
          fi
          echo "OK: $BIN is statically linked"

      - name: Install aarch64 strip
        if: matrix.target == 'aarch64-unknown-linux-musl'
        # binutils only — gcc is not needed because `cross` did the
        # linking inside its Docker image. We need only the `strip`
        # tool here to debloat the artefact before packaging.
        run: sudo apt-get update && sudo apt-get install -y binutils-aarch64-linux-gnu

      - name: Strip binary
        # Release profile already strips on macOS via the cargo
        # `[profile.release] strip = true` block (if present), but
        # an explicit pass is harmless and consistent across targets.
        # On the aarch64 cross we use the cross strip from binutils.
        run: |
          set -e
          BIN=target/${{ matrix.target }}/release/proxxx
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-musl" ]; then
            aarch64-linux-gnu-strip "$BIN" || true
          else
            strip "$BIN" || true
          fi
          ls -lh "$BIN"

      - name: Package
        # Tarball naming: proxxx-<version>-<target>.tar.gz . The version
        # comes from the tag (drop the leading `v`). Tarball contains
        # the binary + LICENSE + README + SECURITY policy so anyone
        # downloading the tarball alone gets the legal + security
        # context without round-tripping to the repo.
        id: pack
        run: |
          set -e
          VERSION="${GITHUB_REF_NAME#v}"
          NAME="proxxx-${VERSION}-${{ matrix.target }}"
          mkdir -p dist/"$NAME"
          cp target/${{ matrix.target }}/release/proxxx dist/"$NAME"/
          cp LICENSE README.md SECURITY.md dist/"$NAME"/
          tar -C dist -czf "dist/${NAME}.tar.gz" "$NAME"
          # SHA256 alongside the tarball so users can pin the artefact
          # without GitHub-API round-trips.
          ( cd dist && shasum -a 256 "${NAME}.tar.gz" > "${NAME}.tar.gz.sha256" )
          ls -lh dist/
          echo "archive=dist/${NAME}.tar.gz" >> "$GITHUB_OUTPUT"
          echo "sha256=dist/${NAME}.tar.gz.sha256" >> "$GITHUB_OUTPUT"
          echo "bundle=dist/${NAME}.tar.gz.cosign.bundle" >> "$GITHUB_OUTPUT"

      - name: Install cosign (sigstore)
        # Pinned action; sigstore-managed. ~5 MiB download, runs in <2s.
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6  # v4.1.2

      - name: Sign tarball with cosign (keyless via OIDC)
        # `--bundle` packs the signature, signing certificate, and
        # transparency-log inclusion proof into a single self-verifiable
        # file. Keyless mode = no long-lived signing key on the runner
        # or anywhere else: the signing cert is short-lived, scoped to
        # this exact workflow path, and rooted in sigstore's public
        # transparency log (rekor.sigstore.dev). Anyone can verify
        # against the OIDC issuer + cert subject without a PGP keyring.
        run: |
          set -e
          cosign sign-blob --yes \
            --bundle "${{ steps.pack.outputs.bundle }}" \
            "${{ steps.pack.outputs.archive }}"
          ls -lh "${{ steps.pack.outputs.bundle }}"

      - name: Upload artifact for the release job
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: ${{ matrix.target }}
          path: |
            ${{ steps.pack.outputs.archive }}
            ${{ steps.pack.outputs.sha256 }}
            ${{ steps.pack.outputs.bundle }}
          retention-days: 7

  # ──────────────────────────────────────────────────────────
  # Release job — collect artifacts and attach to the GH release.
  # ──────────────────────────────────────────────────────────
  release:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create GitHub release + upload assets
      id-token: write   # sigstore OIDC keyless signing
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install Rust toolchain (for cargo-cyclonedx)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable (HEAD as of 2026-03-27)

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1
        with:
          shared-key: release-sbom

      - name: Download all build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          path: artifacts

      - name: Flatten artifact tree
        # actions/download-artifact@v4 puts each artifact into its own
        # subdirectory keyed on the artifact name. Flatten so the
        # release-asset uploader sees a single dist/ directory.
        run: |
          set -e
          mkdir -p dist
          find artifacts -name 'proxxx-*.tar.gz' -exec cp {} dist/ \;
          find artifacts -name 'proxxx-*.tar.gz.sha256' -exec cp {} dist/ \;
          find artifacts -name 'proxxx-*.tar.gz.cosign.bundle' -exec cp {} dist/ \;
          ls -lh dist/

      - name: Generate CycloneDX SBOM
        # `cargo-cyclonedx` reads Cargo.lock and emits a structured
        # dependency manifest in CycloneDX format — authoritative for
        # the source-side dep graph (more precise than scanning the
        # binary, which would miss dev-cfg conditionally-compiled
        # crates and could miss-attribute via stripped strings).
        # The `--locked` install pins the cargo-cyclonedx version
        # itself. `cargo-cyclonedx` reads Cargo.lock by default; it
        # does NOT accept --frozen / --offline / --locked at the
        # subcommand level (different CLI surface from `cargo build`)
        # — see the upstream issue tracker. The lockfile is on disk
        # from the checkout step, so reproducibility is enforced
        # there, not via a flag here.
        run: |
          set -e
          VERSION="${GITHUB_REF_NAME#v}"
          cargo install --locked cargo-cyclonedx
          cargo cyclonedx --format json
          # cargo-cyclonedx emits `bom.json` next to Cargo.toml. Move
          # to dist/ with the proxxx-versioned name so it sits
          # alongside the tarballs in the release.
          if [ -f bom.json ]; then
            mv bom.json "dist/proxxx-${VERSION}.cdx.json"
          else
            # Some versions write `<crate>.cdx.json` instead.
            mv proxxx.cdx.json "dist/proxxx-${VERSION}.cdx.json" 2>/dev/null || true
          fi
          ls -lh dist/proxxx-${VERSION}.cdx.json
          # Sha256 the SBOM too — same as the tarballs, no GitHub-API
          # round-trip needed to pin.
          ( cd dist && shasum -a 256 "proxxx-${VERSION}.cdx.json" > "proxxx-${VERSION}.cdx.json.sha256" )

      - name: Compose release notes
        # Pull the `[X.Y.Z]` section from CHANGELOG.md (the curated,
        # human-written notes for THIS tag), falling back to
        # `[Unreleased]` for the case where a tag is cut before the
        # bump commit has renamed the section, and finally to a link
        # to the file if both are missing. We deliberately do NOT use
        # `gh release create --generate-notes` — the curated CHANGELOG
        # entries beat the auto-generated commit-list every time.
        #
        # Why version-first (and not [Unreleased]-first like the
        # original implementation): the repo's bump convention adds a
        # new `## [X.Y.Z] — YYYY-MM-DD` section while leaving
        # `## [Unreleased]` alone with a `_no entries yet._` placeholder.
        # Old behaviour: every release page got that placeholder
        # instead of the actual notes (visible on the v0.6.1 / v0.6.2
        # pages before this fix). Version-first matches the section
        # the bump commit just wrote.
        id: notes
        run: |
          set -e
          VERSION="${GITHUB_REF_NAME#v}"
          NOTES_FILE="$(mktemp)"

          # The unwrap-prototype lesson (v0.7.3 → v0.7.4): GitHub's
          # release-page renderer treats single newlines INSIDE
          # paragraphs as hard line breaks, NOT as the soft-wrap-becomes-
          # space behaviour of standard GFM. CHANGELOG.md hard-wraps at
          # ~75 chars for git-diff readability, so without post-processing
          # every release page renders with visible mid-sentence breaks
          # (visible on v0.6.1–v0.7.3 — backfilled in-place after this
          # commit lands). The script below joins paragraph-internal
          # lines into single lines while preserving list items
          # (`- ...` / `* ...` / `1. ...`), headings (`# ...`),
          # blockquotes (`> ...`), tables (`| ...`), indented continuations,
          # and fenced code blocks.
          cat > /tmp/unwrap.py <<'PY'
          import sys, re
          in_code = False
          buf = []
          def flush():
              if buf:
                  sys.stdout.write(" ".join(buf) + "\n")
                  buf.clear()
          for raw in sys.stdin.read().splitlines():
              if raw.startswith("```"):
                  flush(); print(raw); in_code = not in_code; continue
              if in_code:
                  flush(); print(raw); continue
              if not raw.strip():
                  flush(); print(); continue
              stripped = raw.lstrip()
              if raw != stripped:
                  flush(); print(raw); continue
              if re.match(r"^([-*+>#|]|\d+[.)]\s)", stripped):
                  flush(); print(raw); continue
              buf.append(raw)
          flush()
          PY

          {
            echo "## proxxx ${GITHUB_REF_NAME}"
            echo
            # 1) Per-version section — `## [X.Y.Z]` through the next
            #    `## [` marker. `awk -v v=...` injects the version as
            #    a literal substring (SemVer's `.` matches itself in
            #    regex; no quoting needed for that).
            # 2) `[Unreleased]` section — safety net for the
            #    pre-bump-commit window or any future convention drift.
            # 3) Link to CHANGELOG.md on the repo at this tag.
            if awk -v v="$VERSION" '$0 ~ "^## \\["v"\\]"{flag=1;next} /^## \[/{flag=0} flag' CHANGELOG.md > /tmp/notes.md && [ -s /tmp/notes.md ]; then
              python3 /tmp/unwrap.py < /tmp/notes.md
            elif awk '/^## \[Unreleased\]/{flag=1;next} /^## \[/{flag=0} flag' CHANGELOG.md > /tmp/notes.md && [ -s /tmp/notes.md ]; then
              python3 /tmp/unwrap.py < /tmp/notes.md
            else
              echo "See [CHANGELOG.md](https://github.com/${GITHUB_REPOSITORY}/blob/${GITHUB_REF_NAME}/CHANGELOG.md) for details."
            fi
            echo
            echo "### Verifying downloads"
            echo
            echo "Three layers of verification ship with every release tarball:"
            echo
            echo "**1. Checksum** — sibling \`.sha256\` file:"
            echo
            echo '```bash'
            echo 'shasum -a 256 -c proxxx-*-<target>.tar.gz.sha256'
            echo '```'
            echo
            echo "**2. Sigstore keyless signature** — sibling \`.cosign.bundle\`:"
            echo
            echo '```bash'
            echo "cosign verify-blob \\"
            echo "  --bundle proxxx-${VERSION}-<target>.tar.gz.cosign.bundle \\"
            echo "  --certificate-identity-regexp 'https://github.com/${GITHUB_REPOSITORY}/.github/workflows/release.yml@.*' \\"
            echo "  --certificate-oidc-issuer 'https://token.actions.githubusercontent.com' \\"
            echo "  proxxx-${VERSION}-<target>.tar.gz"
            echo '```'
            echo
            echo "The certificate identity pins to this exact workflow path —"
            echo "a leaked sigstore cert from any other repo cannot validate"
            echo "against these bundles. The transparency-log inclusion proof"
            echo "is embedded in the bundle; no online lookup at verify time."
            echo
            echo "**3. CycloneDX SBOM** — \`proxxx-${VERSION}.cdx.json\` lists"
            echo "every dependency from \`Cargo.lock\` with name + version +"
            echo "checksum + license. Audit with \`cyclonedx-cli\`,"
            echo "\`grype\`, \`trivy\`, or any SBOM-aware scanner:"
            echo
            echo '```bash'
            echo "grype sbom:proxxx-${VERSION}.cdx.json"
            echo '```'
          } > "$NOTES_FILE"
          echo "notes_file=$NOTES_FILE" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release + upload assets
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b  # v3.0.1
        with:
          # Trigger fired on `v*` tag, so `github.ref_name` is `vX.Y.Z`.
          tag_name: ${{ github.ref_name }}
          name: proxxx ${{ github.ref_name }}
          body_path: ${{ steps.notes.outputs.notes_file }}
          files: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
            dist/*.cosign.bundle
            dist/*.cdx.json
            dist/*.cdx.json.sha256
          # `draft: false` publishes immediately; flip to true if you
          # want to review before announcing.
          draft: false
          # `prerelease: true` only for `vX.Y.Z-rc*`, `-beta*`, `-alpha*`
          # — i.e. tags with a hyphen suffix. `v0.x.y` tags are
          # production releases (proxxx has been v0.x since v0.1.0,
          # following SemVer pre-1.0 strictly), not pre-releases.
          # The previous rule flipped every `v0.*` to prerelease,
          # which hid the latest stable from the releases page.
          prerelease: ${{ contains(github.ref_name, '-') }}
          fail_on_unmatched_files: true
