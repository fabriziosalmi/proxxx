# Weekly cloud-image registry re-pin.
#
# `cloud-img download` pins every entry to a checksum, which requires a
# dated/immutable URL — so the registry goes stale when a distro ships a
# point release. This job runs `scripts/repin-cloudimg.py` to fetch each
# distro's latest dated build + official checksum, patches the registry
# in src/cli/cloudimg.rs, validates the patch compiles + passes the
# registry invariant tests, and opens a bump PR on change.
#
# It NEVER auto-merges: re-pinning a SHA is supply-chain-sensitive, so a
# human reviews the diff (same posture as Dependabot). The PR body
# carries the script's per-distro change summary.

name: cloud-img re-pin

on:
  schedule:
    # Mondays 05:11 UTC — offset from the Scorecard (04:31) and CodeQL
    # (Wed 04:23) crons so the runners don't all wake at once.
    - cron: "11 5 * * 1"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  repin:
    name: Re-pin registry + open PR on drift
    runs-on: ubuntu-latest
    permissions:
      contents: write # push the bump branch
      pull-requests: write # open the PR
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Re-pin (write mode)
        id: repin
        run: |
          set -euo pipefail
          # Capture the human-readable change summary for the PR body.
          summary="$(python3 scripts/repin-cloudimg.py 2>repin.warn)" || rc=$?
          rc="${rc:-0}"
          echo "$summary"
          cat repin.warn >&2 || true
          # Exit 2 = a distro probe failed (other entries still repinned).
          # Surface it but don't abort — the PR (if any) gets flagged.
          if [ "$rc" = "2" ]; then
            echo "probe_warning=true" >> "$GITHUB_OUTPUT"
          elif [ "$rc" != "0" ]; then
            echo "::error::repin script failed with exit $rc"; exit "$rc"
          fi
          # Persist the summary for later steps (multiline-safe).
          {
            echo "summary<<__EOF__"
            echo "$summary"
            echo "__EOF__"
          } >> "$GITHUB_OUTPUT"
          if git diff --quiet -- src/cli/cloudimg.rs; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Rust
        if: steps.repin.outputs.changed == 'true'
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        if: steps.repin.outputs.changed == 'true'

      - name: Validate the patched registry
        if: steps.repin.outputs.changed == 'true'
        # The cloudimg unit tests enforce: checksum length matches the
        # declared algorithm, lowercase hex, NOT all-zero, and no
        # rotating-symlink URLs. If the fetched data is malformed, this
        # fails BEFORE a PR is opened.
        run: cargo test --release --lib cloudimg

      - name: Open / update bump PR
        if: steps.repin.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SUMMARY: ${{ steps.repin.outputs.summary }}
          PROBE_WARNING: ${{ steps.repin.outputs.probe_warning }}
        run: |
          set -euo pipefail
          BRANCH="automated/cloudimg-repin"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "$BRANCH"
          git add src/cli/cloudimg.rs
          git commit -m "chore(cloud-img): re-pin registry to latest upstream builds

          Automated by .github/workflows/cloudimg-repin.yml.

          $SUMMARY"
          git push --force origin "$BRANCH"
          warn_note=""
          if [ "${PROBE_WARNING:-}" = "true" ]; then
            warn_note=$'\n\n⚠️ One or more distro probes failed this run — see the workflow log. The entries that *did* repin are in this diff; the failed one was left at its previous pin.'
          fi
          body="$(printf '## Automated cloud-img re-pin\n\nUpstream point releases detected — registry repinned to the latest dated/immutable builds + their official checksums.\n\n```\n%s\n```\n\nValidated: `cargo test --release --lib cloudimg` passed (checksum length matches algorithm, lowercase hex, not all-zero, no rotating-symlink URLs).%s\n\n**Review before merge** — this changes pinned SHA values. Confirm the checksums against the official sidecars if in doubt. Close+reopen the PR (or push an empty commit) to trigger the full CI gate if it did not auto-run.\n\n🤖 generated by the cloud-img re-pin cron' "$SUMMARY" "$warn_note")"
          if gh pr view "$BRANCH" --json state --jq .state 2>/dev/null | grep -q OPEN; then
            gh pr edit "$BRANCH" --body "$body"
            echo "updated existing PR"
          else
            gh pr create --base main --head "$BRANCH" \
              --title "chore(cloud-img): re-pin registry to latest upstream builds" \
              --body "$body"
          fi
