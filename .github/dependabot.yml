# Dependabot — keep cargo and GitHub Actions deps fresh.
#
# Why weekly + grouped: a daily firehose of single-dep PRs is cognitive
# noise that pushes maintainers to merge without reviewing. Grouping
# patch + minor bumps into one PR per ecosystem per week keeps the
# review surface manageable while still catching CVEs within ~7 days
# of disclosure (cargo audit nightly catches the urgent ones earlier).
#
# Major bumps come as separate PRs by design — those need attention.

version: 2

updates:
  # Rust crate deps
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Rome"
    open-pull-requests-limit: 5
    labels:
      - "deps"
      - "cargo"
    commit-message:
      prefix: "deps(cargo)"
      include: "scope"
    ignore:
      # keyring 4.x — upstream maintainer explicitly says NOT to use
      # this version for real apps (the v4 crate is "just a sample
      # app" per the v4.0.0 release notes; app users should depend on
      # `keyring-core` v1 instead, after picking a credential-store
      # implementation crate). See
      # https://github.com/open-source-cooperative/keyring-rs
      # release notes for v4.0.0. We stay on keyring 3.x until either
      # upstream walks back the deprecation OR we do the migration to
      # `keyring-core` + a chosen backend. Closed PR #28 with this
      # same rationale 2026-05-19.
      - dependency-name: "keyring"
        update-types: ["version-update:semver-major"]
    groups:
      patch-and-minor:
        update-types:
          - "patch"
          - "minor"
        # Reqwest + tokio + ratatui are large enough surfaces that we
        # want to look at them individually even on patch bumps.
        exclude-patterns:
          - "reqwest"
          - "tokio*"
          - "ratatui"
          - "russh*"

  # GitHub Actions deps (workflow YAML uses external actions).
  #
  # Every `uses:` in `.github/workflows/*.yml` is pinned to a 40-char
  # commit SHA with a trailing `# vX.Y.Z` comment. Dependabot is
  # configured to update both atomically — the SHA and the comment —
  # rather than letting the pin drift past a published release. This
  # closes the tj-actions/changed-files-style attack window where a
  # compromised tag (e.g. `@v4`) could re-point at malicious code.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Rome"
    open-pull-requests-limit: 5
    labels:
      - "deps"
      - "ci"
    commit-message:
      prefix: "deps(ci)"
      include: "scope"
    groups:
      actions-patch-and-minor:
        update-types:
          - "patch"
          - "minor"
