# proxxx — GitOps reconcile-loop demo storyboard.
#
# One story, the loop that defines the project: the live cluster has drifted
# from the desired state declared in git; proxxx DETECTS the drift, CONVERGES
# the cluster back to git (safe by default — deletes need an explicit --prune),
# and PROVES it is back in sync.
#
# Every machine-output line below is VERBATIM from a real run of
# `proxxx reconcile` against a live Proxmox VE 9.1 cluster (pve-test-1),
# captured 2026-06-30. Only the single leading `#` line is narration.
#
# Render:  cd ../firstframe && cargo run --release -- build \
#            ../proxxx/assets/demo-gitops.toml -o ../proxxx/assets/demo-gitops.svg

[meta]
name        = "proxxx"
tagline     = "proxxx — GitOps for Proxmox · detect drift → converge → in sync"
theme       = "mocha"
width       = 900
height      = 740
seed        = 0xD1FFC0DE
end_hold_ms = 2600

# ── act 1: the premise — git is the source of truth, the cluster drifted ──
[[beat]]
kind        = "silence"
duration_ms = 1100

[[beat]]
kind       = "output"
stagger_ms = 0
lines = [
  { text = "# infra.git holds the desired cluster state — and someone just changed things by hand", accent = "dim" },
]

[[beat]]
kind        = "silence"
duration_ms = 750

# ── act 2: detect drift — read-only, CI-gateable (exit 2) ──
[[beat]]
kind = "prompt"
text = "$ "

[[beat]]
kind   = "type"
text   = "proxxx reconcile run --source infra.git"
cps    = 16
jitter = 0.30

[[beat]]
kind        = "silence"
duration_ms = 750

[[beat]]
kind       = "output"
stagger_ms = 200
lines = [
  { text = "  ✗ DRIFT — 2 change(s) across 1 family", accent = "red" },
  "     pool                   1 create, 1 delete",
  "",
  { text = "  - pool: team-staging", accent = "red" },
  { text = "  + pool: web-prod", accent = "green" },
]

[[beat]]
kind        = "silence"
duration_ms = 1600

# ── act 2½: preview the convergence first — never blind-apply ──
[[beat]]
kind = "prompt"
text = "$ "

[[beat]]
kind   = "type"
text   = "proxxx reconcile converge --source infra.git --dry-run"
cps    = 16
jitter = 0.30

[[beat]]
kind        = "silence"
duration_ms = 650

[[beat]]
kind       = "output"
stagger_ms = 160
lines = [
  { text = "  - pool: team-staging — skipped (dry_run)", accent = "sub" },
  { text = "  + pool: web-prod — skipped (dry_run)", accent = "sub" },
  "",
  { text = "  → applied 0 / failed 0 / skipped 2", accent = "sub" },
]

[[beat]]
kind        = "silence"
duration_ms = 1500

# ── act 3: converge — safe by default; the stray-delete is HELD ──
[[beat]]
kind = "prompt"
text = "$ "

[[beat]]
kind   = "type"
text   = "proxxx reconcile converge --source infra.git"
cps    = 16
jitter = 0.30

[[beat]]
kind        = "silence"
duration_ms = 650

[[beat]]
kind       = "output"
stagger_ms = 230
lines = [
  { text = "  - pool: team-staging — skipped (prune_policy)", accent = "yellow" },
  { text = "  + pool: web-prod — applied", accent = "green" },
  "",
  { text = "  → applied 1 / failed 0 / skipped 1", accent = "sub" },
]

[[beat]]
kind        = "silence"
duration_ms = 1600

# ── act 4: opt in — prune the hand-made pool that git never declared ──
[[beat]]
kind = "prompt"
text = "$ "

[[beat]]
kind   = "type"
text   = "proxxx reconcile converge --source infra.git --prune"
cps    = 16
jitter = 0.30

[[beat]]
kind        = "silence"
duration_ms = 650

[[beat]]
kind       = "output"
stagger_ms = 0
lines = [
  { text = "  - pool: team-staging — applied", accent = "green" },
  "",
  { text = "  → applied 1 / failed 0 / skipped 0", accent = "sub" },
]

[[beat]]
kind        = "silence"
duration_ms = 1400

# ── act 5: prove it — back in sync (exit 0) ──
[[beat]]
kind = "prompt"
text = "$ "

[[beat]]
kind   = "type"
text   = "proxxx reconcile run --source infra.git"
cps    = 16
jitter = 0.30

[[beat]]
kind        = "silence"
duration_ms = 650

[[beat]]
kind       = "output"
stagger_ms = 0
lines = [
  { text = "  ✓ IN SYNC — live matches desired (0 changes)", accent = "green" },
]

# ── outro ──
[[beat]]
kind        = "silence"
duration_ms = 700

[[beat]]
kind    = "outro"
url     = "github.com/fabriziosalmi/proxxx"
label   = "PROXXX"
dim_ms  = 550
url_cps = 42
hold_ms = 1900
