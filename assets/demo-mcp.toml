# proxxx — MCP (LLM agent) demo storyboard.
#
# One story for the AI-agent integrator: proxxx is an MCP server, so any
# MCP client (Claude, Cursor, …) gets typed, audited access to the cluster
# — 25 tools, the 10 destructive ones flagged so the host can gate them. The
# agent calls one and gets live, structured truth back.
#
# Verbatim from real runs against a live PVE 9.1 cluster (pve-test-1),
# 2026-06-30; destructive count refreshed for v0.13.0, which flipped
# create_snapshot + suspend_guest to destructive (8 → 10). The
# `{"tools":25,"destructive":10}` line matches the real output of
# `proxxx mcp tools | jq …`; the two guest objects are the real result of an
# MCP `tools/call list_guests` (projected to key fields for width — every
# value shown is real). Lines beginning `#` / `→` annotate the exchange.
#
# Render:  cd ../firstframe && cargo run --release -- build \
#            ../proxxx/assets/demo-mcp.toml -o ../proxxx/assets/demo-mcp.svg

[meta]
name        = "proxxx"
tagline     = "proxxx — MCP server · 25 typed tools for your AI agent"
theme       = "mocha"
width       = 900
height      = 430
seed        = 0x3C0DEA1
end_hold_ms = 2400

# ── act 1: proxxx is an MCP server — what can the agent do? ──
[[beat]]
kind        = "silence"
duration_ms = 1100

[[beat]]
kind       = "output"
stagger_ms = 0
lines = [
  { text = "# proxxx is an MCP server — point Claude or Cursor straight at the cluster", accent = "dim" },
]

[[beat]]
kind        = "silence"
duration_ms = 700

[[beat]]
kind = "prompt"
text = "$ "

[[beat]]
kind   = "type"
text   = "proxxx mcp tools | jq '.tools | length'"
cps    = 17
jitter = 0.28

[[beat]]
kind        = "silence"
duration_ms = 600

[[beat]]
kind       = "output"
stagger_ms = 0
lines = [
  { text = "25", accent = "cyan" },
]

[[beat]]
kind        = "silence"
duration_ms = 1200

# ── act 2: the agent calls a tool — live, typed, audited ──
[[beat]]
kind       = "output"
stagger_ms = 0
lines = [
  { text = "# 25 typed tools, 10 of them flagged destructive — the agent calls one, read-only:", accent = "dim" },
]

[[beat]]
kind        = "silence"
duration_ms = 600

[[beat]]
kind       = "output"
stagger_ms = 260
lines = [
  { text = "  → tools/call  list_guests  {}", accent = "blue" },
  { text = "  ← proxxx-mcp  (live cluster, read-only)", accent = "dim" },
  "",
  '  {"vmid":8888,"name":"alpine-existing-vm","type":"qemu","status":"stopped","node":"pve-test-1"}',
  { text = '  {"vmid":7777,"name":"alpine-existing-lxc","type":"lxc","status":"running","node":"pve-test-1"}', accent = "green" },
]

# ── outro ──
[[beat]]
kind        = "silence"
duration_ms = 900

[[beat]]
kind    = "outro"
url     = "github.com/fabriziosalmi/proxxx"
label   = "PROXXX"
dim_ms  = 550
url_cps = 42
hold_ms = 1900
